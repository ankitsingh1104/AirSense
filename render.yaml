services:
  - type: web
    name: air-pollution-api
    runtime: python
    rootDir: air_pollution_ml
    buildCommand: pip install -r requirements_api.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: WAQI_API_KEY
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: DB_PATH
        value: ./data/aqi_history.db
      - key: FRONTEND_URL
        sync: false
      - key: REFRESH_INTERVAL_MINUTES
        value: 15
      - key: MODEL_DIR
        value: ./models

  - type: web
    name: air-pollution-frontend
    runtime: static
    rootDir: air_pollution_ml/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html